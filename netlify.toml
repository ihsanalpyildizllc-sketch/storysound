[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[functions."shopify-order-webhook"]
  timeout = 10

[functions."generate-song-background"]
  timeout = 900

[[redirects]]
  from = "/create"
  to = "/create.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/memory-video"
  to = "/memory-video.html"
  status = 200

[[redirects]]
  from = "/test"
  to = "/test.html"
  status = 200

# rebuild trigger
