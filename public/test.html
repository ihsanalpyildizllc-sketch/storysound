<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Song — StorySound</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF8F4;font-family:"Inter",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:36px 32px;max-width:540px;width:100%;border:1px solid rgba(0,0,0,0.08);box-shadow:0 4px 24px rgba(0,0,0,0.08)}
h1{font-family:"Playfair Display",serif;font-size:26px;color:#18120E;margin-bottom:6px}
.sub{font-size:14px;color:#8A7D75;margin-bottom:24px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#8A7D75;margin-bottom:6px}
textarea,input,select{width:100%;border:1px solid rgba(0,0,0,0.1);border-radius:10px;padding:11px 14px;font-family:"Inter",sans-serif;font-size:14px;color:#18120E;background:#fff;outline:none;margin-bottom:14px}
textarea{min-height:80px;resize:vertical}
.btn{width:100%;background:#B5471C;color:#fff;border:none;border-radius:100px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn:hover{background:#8E3415}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.log{background:#f5f5f5;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;color:#333;margin:12px 0;min-height:24px;line-height:1.8;word-break:break-all}
.result{display:none;margin-top:20px;padding-top:20px;border-top:1px solid rgba(0,0,0,0.08)}
.song-title{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;color:#18120E;margin-bottom:14px}
audio{width:100%;margin-bottom:10px}
.dl-btn{display:block;text-align:center;padding:10px;background:#2A6644;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:14px}
.lyrics{font-size:13px;color:#666;line-height:1.9;font-style:italic;white-space:pre-wrap;padding-top:14px;border-top:1px solid rgba(0,0,0,0.08)}
</style>
</head>
<body>
<div class="card">
  <h1>🎵 Song Generator</h1>
  <p class="sub">Yuliana's story is pre-filled. Hit Generate.</p>

  <label>Name</label>
  <input id="recipient" value="Yuliana / Yubito">

  <label>Genre</label>
  <input id="genre" value="Emotional R&B, Daniel Caesar Giveon style, 70 BPM">

  <label>Their Story</label>
  <textarea id="story">Met on Bumble. The moment he saw her he was shocked by her beauty. Their start was not perfect, both made mistakes. But their love grew stronger. She is the nicest and most caring person he ever met. He loves her eyes especially when she looks at him. Abu Dhabi trip was unforgettable, he took care of her. First time she cooked it was burned but he loved it from her hands. She gets angry sometimes just like him. But the way she is growing and improving makes him incredibly proud. She listens and takes action. She is the only one he imagines as the mother of his children. He loves her and is sorry for his mistakes. Nickname: Yubito.</textarea>

  <div class="log" id="log">Ready. Click Generate to start.</div>

  <button class="btn" id="btn" onclick="generate()">🎵 Generate Song</button>

  <div class="result" id="result">
    <div class="song-title" id="sTitle"></div>
    <audio id="player" controls></audio>
    <a class="dl-btn" id="dlLink" download="song.mp3">⬇ Download MP3</a>
    <div class="lyrics" id="lyrics"></div>
  </div>
</div>

<script>
function log(msg) {
  document.getElementById('log').textContent = msg;
  console.log(msg);
}

async function generate() {
  const btn = document.getElementById('btn');
  btn.disabled = true;

  const payload = {
    names: document.getElementById('recipient').value.trim(),
    story: document.getElementById('story').value.trim(),
    genre: document.getElementById('genre').value.trim(),
    mood: 'Romantic', vocals: 'vocals', forWhom: 'girlfriend'
  };

  try {
    log('Step 1: Calling song generator...');
    const res = await fetch('/.netlify/functions/test-lyria', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    log('Step 2: Got response. Status: ' + res.status + '. Parsing JSON...');

    let d;
    try {
      d = await res.json();
    } catch(parseErr) {
      log('ERROR: JSON parse failed. Status was ' + res.status);
      btn.disabled = false;
      return;
    }

    log('Step 3: Keys in response: ' + Object.keys(d).join(', '));

    if (d.error) { log('ERROR: ' + d.error); btn.disabled = false; return; }
    if (d.lyria_error) { log('LYRIA ERROR: ' + d.lyria_error.substring(0,200)); btn.disabled = false; return; }
    if (d.no_audio) { log('No audio: ' + JSON.stringify(d)); btn.disabled = false; return; }

    if (!d.audio_b64) {
      log('No audio_b64 in response. Response: ' + JSON.stringify(d).substring(0,300));
      btn.disabled = false;
      return;
    }

    log('Step 4: Got audio! ' + d.audio_size_kb + 'KB. Decoding...');

    try {
      const bytes = Uint8Array.from(atob(d.audio_b64), c => c.charCodeAt(0));
      const blob = new Blob([bytes], { type: d.audio_mime || 'audio/mpeg' });
      const url = URL.createObjectURL(blob);

      document.getElementById('sTitle').textContent = '"' + d.song_title + '"';
      document.getElementById('player').src = url;
      document.getElementById('dlLink').href = url;
      document.getElementById('dlLink').download = d.song_title + '.mp3';
      if (d.lyrics) document.getElementById('lyrics').textContent = d.lyrics;
      document.getElementById('result').style.display = 'block';
      log('✅ Done! Song "' + d.song_title + '" — ' + d.audio_size_kb + 'KB');
    } catch(audioErr) {
      log('Audio decode error: ' + audioErr.message);
    }

  } catch(e) {
    log('FETCH ERROR: ' + e.message);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
